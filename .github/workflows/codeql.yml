name: "CodeQL"

on:
  push:
    branches: [ "main", stable ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '30 5 * * 0' # 5:30h on Sundays

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    container: ${{ vars.SELF_HOSTED_REGISTRY }}/community/gvm-libs:edge

    strategy:
      fail-fast: false
      matrix:
        language: [ 'c' ]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ./.github/actions/install-dependencies-action

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    # build between init and analyze ...
    - name: Configure and Compile boreas
      run: |
        mkdir build && cd build/ && cmake \
        -DCMAKE_BUILD_TYPE=Release .. && make install
      working-directory: ${{ github.WORKSPACE }}
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc
      with:
        category: "/language:${{matrix.language}}"
